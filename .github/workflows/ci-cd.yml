name: CI-CD Portfolio

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            target/surefire-reports/**
            logs/pruebas.csv
            logs/logback.log

  deploy-pages:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: ci
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-report-${{ github.run_attempt }}
          path: report-artifact

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p public

          if [ -d "report-artifact/target/surefire-reports" ]; then
            cp -R report-artifact/target/surefire-reports/* public/
          fi

          if [ ! -f "public/index.html" ]; then
            {
              echo '<!doctype html>'
              echo '<html lang="en">'
              echo '<head>'
              echo '  <meta charset="utf-8" />'
              echo '  <meta name="viewport" content="width=device-width, initial-scale=1" />'
              echo '  <title>Test Report</title>'
              echo '  <style>'
              echo '    body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }'
              echo '    h1 { margin-bottom: 0.5rem; }'
              echo '    a { color: #0f62fe; }'
              echo '  </style>'
              echo '</head>'
              echo '<body>'
              echo '  <h1>Calificacion Empresas - Test Report</h1>'
              echo '  <p>No HTML report was generated for this run.</p>'
              echo '</body>'
              echo '</html>'
            } > public/index.html
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_attempt }}
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
